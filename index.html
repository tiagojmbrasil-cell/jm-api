<!-- Motoristas Inseridos Section -->
<section id="motoristas-inseridos">
    <h2>Motoristas Inseridos</h2>
    <ul id="driver-list"></ul>
    <script>
        const drivers = []; // Array to hold driver data

        function displayDrivers() {
            const driverList = document.getElementById('driver-list');
            driverList.innerHTML = ''; // Clear the list first
            drivers.forEach((driver, index) => {
                const listItem = document.createElement('li');
                listItem.textContent = driver;
                
                const deleteButton = document.createElement('button');
                deleteButton.textContent = 'Remove';
                deleteButton.onclick = function() {
                    removeDriver(index);
                };
                
                listItem.appendChild(deleteButton);
                driverList.appendChild(listItem);
            });
        }

        function removeDriver(index) {
            drivers.splice(index, 1); // Remove driver from array
            displayDrivers(); // Update the UI
            // Call a function to update the database here
            // Example: updateDatabase(drivers);
        }

        // Example function to simulate adding a driver
        function addDriver(driver) {
            drivers.push(driver);
            displayDrivers();
        }
    </script>
</section>
